name: Seed Camp Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fetch-camps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Fetch camp data
        env:
          RIDB_API_KEY: ${{ secrets.RIDB_API_KEY }}
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
        run: python scripts/fetch_camps.py
      - name: Commit and push camps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add camps.json
          git diff --staged --quiet || git commit -m "chore: update camp data $(date -u '+%Y-%m-%d')"
          git push
