name: Seed Camp Data
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  fetch-camps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Fetch camp data
        env:
          RIDB_API_KEY: ${{ secrets.RIDB_API_KEY }}
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
        run: python scripts/fetch_camps.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add camps.json
          # Only add verified_overrides.csv if it was just created (first run)
          git add --ignore-unmatch verified_overrides.csv
          git diff --staged --quiet || git commit -m "chore: update camp data $(date -u '+%Y-%m-%d')"
          git push
