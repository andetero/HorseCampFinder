<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HorseCamp Trip</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --earth: #3D2B1A; --hay: #D4A853; --trail: #5C7A4E; --cream: #FAF6EE; --saddle: #8B5E3C; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--earth); }
    nav { background: var(--earth); padding: 1rem 5vw; display: flex; align-items: center; gap: 12px; }
    nav .logo { font-family: 'Playfair Display', serif; color: var(--hay); font-size: 1.2rem; }
    nav .badge { background: var(--trail); color: white; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; }
    .hero { background: var(--earth); padding: 2rem 5vw; border-bottom: 1px solid rgba(212,168,83,0.2); }
    .hero h1 { font-family: 'Playfair Display', serif; color: var(--hay); font-size: 1.8rem; }
    .hero p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; }
    main { max-width: 640px; margin: 0 auto; padding: 2rem 5vw; }
    .trip-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.06); }
    .route-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .route-point { flex: 1; }
    .route-label { font-size: 0.7rem; color: var(--saddle); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 2px; }
    .route-name { font-size: 0.95rem; font-weight: 600; }
    .route-arrow { color: var(--hay); font-size: 1.2rem; flex-shrink: 0; }
    .meta-row { display: flex; gap: 20px; padding: 12px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; }
    .meta-item { display: flex; flex-direction: column; gap: 2px; }
    .meta-label { font-size: 0.7rem; color: var(--saddle); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .meta-value { font-size: 0.95rem; font-weight: 600; }
    .stops-title { font-size: 0.75rem; color: var(--saddle); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 10px; }
    .stop-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .stop-row:last-child { border-bottom: none; }
    .stop-num { width: 24px; height: 24px; background: var(--hay); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--earth); flex-shrink: 0; }
    .stop-name { font-size: 0.9rem; font-weight: 600; }
    .stop-loc { font-size: 0.78rem; color: #888; margin-top: 1px; }
    .open-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; margin-top: 20px; background: var(--hay); color: var(--earth); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none; }
    .no-app { text-align: center; font-size: 0.78rem; color: #aaa; margin-top: 10px; }
    .no-app a { color: var(--saddle); font-weight: 600; text-decoration: none; }
    .no-data { text-align: center; padding: 40px; }
    .no-data h2 { margin-bottom: 8px; }
    .no-data p { color: #888; font-size: 0.9rem; }
    @media (prefers-color-scheme: dark) {
      body { background: #1C1208; color: #FAF6EE; }
      .trip-card { background: #2C1E10; border-color: rgba(255,255,255,0.08); }
      .stop-row, .meta-row { border-color: rgba(255,255,255,0.08); }
    }
  </style>
</head>
<body>
<nav>
  <span class="logo">🐴 HorseCamp</span>
  <span class="badge">SHARED TRIP</span>
</nav>
<div class="hero">
  <h1 id="trip-name">Shared Trip</h1>
  <p>Tap below to open in HorseCamp</p>
</div>
<main id="content">
  <div class="no-data"><h2>Loading...</h2><p>Reading trip data</p></div>
</main>
<script>
  function formatDate(ts) {
    return new Date(ts * 1000).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  function tryParse(str) {
    try { return JSON.parse(str); } catch(e) {}
    try { return JSON.parse(decodeURIComponent(str)); } catch(e) {}
    return null;
  }

  function openInApp(rawD) {
    // iframe trick — most reliable way to open custom URL schemes in mobile Safari
    // without triggering "invalid address" error
    var iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = 'horsecamp://trip?d=' + rawD;
    document.body.appendChild(iframe);
    setTimeout(function() {
      document.body.removeChild(iframe);
    }, 500);
  }

  function render(trip, rawD) {
    document.getElementById('trip-name').textContent = trip.name || 'Shared Trip';
    const stopCount = (trip.stops || []).length;
    let stopsHtml = '';
    if (stopCount > 0) {
      stopsHtml = '<div class="stops-title">Overnight Stops</div>' +
        trip.stops.map((s, i) =>
          '<div class="stop-row"><div class="stop-num">' + (i+1) + '</div><div>' +
          '<div class="stop-name">' + s.campName + '</div>' +
          '<div class="stop-loc">' + s.location + '</div></div></div>'
        ).join('');
    }
    document.getElementById('content').innerHTML =
      '<div class="trip-card">' +
      '<div class="route-row">' +
        '<div class="route-point"><div class="route-label">From</div><div class="route-name">' + (trip.originName||'—') + '</div></div>' +
        '<div class="route-arrow">→</div>' +
        '<div class="route-point" style="text-align:right"><div class="route-label">To</div><div class="route-name">' + (trip.destinationName||'—') + '</div></div>' +
      '</div>' +
      '<div class="meta-row">' +
        '<div class="meta-item"><span class="meta-label">Departure</span><span class="meta-value">' + formatDate(trip.departureSince1970) + '</span></div>' +
        '<div class="meta-item"><span class="meta-label">Stops</span><span class="meta-value">' + stopCount + ' camp' + (stopCount!==1?'s':'') + '</span></div>' +
      '</div>' +
      stopsHtml +
      '<button class="open-btn" id="open-btn">📍 Open in HorseCamp</button>' +
      '<div class="no-app">Don't have HorseCamp? <a href="https://apps.apple.com/app/horsecamp">Download on the App Store</a></div>' +
      '</div>';

    document.getElementById('open-btn').addEventListener('click', function() {
      openInApp(rawD);
    });
  }

  const search = window.location.search;
  const match = search.match(/[?&]d=([^&]*)/);
  if (match) {
    const rawD = match[1];
    const trip = tryParse(rawD);
    if (trip) {
      render(trip, rawD);
    } else {
      document.getElementById('content').innerHTML =
        '<div class="no-data"><h2>Could not read trip</h2><p>The link may be invalid. Try sharing the trip again from HorseCamp.</p></div>';
    }
  } else {
    document.getElementById('content').innerHTML =
      '<div class="no-data"><h2>No trip data</h2><p>Share a trip from the HorseCamp app to generate a link.</p></div>';
  }
</script>
</body>
</html>
