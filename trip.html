<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HorseCamp Trip</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --earth: #3D2B1A; --hay: #D4A853; --trail: #5C7A4E; --cream: #FAF6EE; --saddle: #8B5E3C; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--earth); }
    nav { background: var(--earth); padding: 1rem 5vw; display: flex; align-items: center; gap: 12px; }
    nav .logo { font-family: 'Playfair Display', serif; color: var(--hay); font-size: 1.2rem; }
    nav .badge { background: var(--trail); color: white; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .hero { background: var(--earth); padding: 2rem 5vw; border-bottom: 1px solid rgba(212,168,83,0.2); }
    .hero h1 { font-family: 'Playfair Display', serif; color: var(--hay); font-size: 1.8rem; }
    .hero p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; }
    main { max-width: 640px; margin: 0 auto; padding: 2rem 5vw; }
    .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.06); }
    .route-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .route-point { flex: 1; }
    .rlabel { font-size: 0.7rem; color: var(--saddle); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 2px; }
    .rname { font-size: 0.95rem; font-weight: 600; }
    .arrow { color: var(--hay); font-size: 1.2rem; }
    .meta { display: flex; gap: 20px; padding: 12px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; }
    .mlabel { font-size: 0.7rem; color: var(--saddle); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .mvalue { font-size: 0.95rem; font-weight: 600; margin-top: 2px; }
    .stitle { font-size: 0.75rem; color: var(--saddle); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 10px; }
    .srow { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .srow:last-child { border-bottom: none; }
    .snum { width: 24px; height: 24px; background: var(--hay); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--earth); flex-shrink: 0; }
    .sname { font-size: 0.9rem; font-weight: 600; }
    .sloc { font-size: 0.78rem; color: #888; margin-top: 1px; }
    .btn { display: block; width: 100%; padding: 14px; margin-top: 20px; background: var(--hay); color: var(--earth); border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
    .noapp { text-align: center; font-size: 0.78rem; color: #aaa; margin-top: 10px; }
    .noapp a { color: var(--saddle); font-weight: 600; }
    .nodata { text-align: center; padding: 40px; }
    @media (prefers-color-scheme: dark) {
      body { background: #1C1208; color: #FAF6EE; }
      .card { background: #2C1E10; border-color: rgba(255,255,255,0.08); }
      .srow, .meta { border-color: rgba(255,255,255,0.08); }
    }
  </style>
</head>
<body>
<nav>
  <span class="logo">🐴 HorseCamp</span>
  <span class="badge">SHARED TRIP</span>
</nav>
<div class="hero">
  <h1 id="trip-name">Shared Trip</h1>
  <p>Tap below to open in HorseCamp</p>
</div>
<main id="main">
  <p style="text-align:center;padding:40px;color:#888">Loading...</p>
</main>
<script>
window.onerror = function(msg, src, line) {
  document.getElementById('main').innerHTML = '<div class="nodata"><h2>JS Error</h2><p>' + msg + ' (line ' + line + ')</p></div>';
  return true;
};

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'});
}

function go() {
  var search = window.location.search;
  var match = search.match(/[?&]d=([^&]+)/);
  if (!match) {
    document.getElementById('main').innerHTML = '<div class="nodata"><h2>No trip data</h2><p>search was: ' + search.substring(0,80) + '</p></div>';
    return;
  }

  var raw = match[1];
  var trip = null;

  try { trip = JSON.parse(decodeURIComponent(raw)); } catch(e1) {
    try { trip = JSON.parse(raw); } catch(e2) {
      document.getElementById('main').innerHTML = '<div class="nodata"><h2>Could not parse trip</h2><p>Raw starts with: ' + raw.substring(0,80) + '</p></div>';
      return;
    }
  }

  document.getElementById('trip-name').textContent = trip.name || 'Shared Trip';

  var stops = trip.stops || [];
  var stopsHtml = '';
  if (stops.length > 0) {
    stopsHtml += '<div class="stitle">Overnight Stops</div>';
    for (var i = 0; i < stops.length; i++) {
      stopsHtml += '<div class="srow"><div class="snum">' + (i+1) + '</div><div><div class="sname">' + stops[i].campName + '</div><div class="sloc">' + stops[i].location + '</div></div></div>';
    }
  }

  var html = '<div class="card">';
  html += '<div class="route-row"><div class="route-point"><div class="rlabel">From</div><div class="rname">' + (trip.originName||'—') + '</div></div>';
  html += '<div class="arrow">→</div>';
  html += '<div class="route-point" style="text-align:right"><div class="rlabel">To</div><div class="rname">' + (trip.destinationName||'—') + '</div></div></div>';
  html += '<div class="meta"><div><div class="mlabel">Departure</div><div class="mvalue">' + fmtDate(trip.departureSince1970) + '</div></div>';
  html += '<div><div class="mlabel">Stops</div><div class="mvalue">' + stops.length + ' camp' + (stops.length !== 1 ? 's' : '') + '</div></div></div>';
  html += stopsHtml;
  html += '<button class="btn" id="openbtn">📍 Open in HorseCamp</button>';
  html += '<div class="noapp">No app? <a href="https://apps.apple.com/app/horsecamp">Download HorseCamp</a></div>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;

  document.getElementById('openbtn').addEventListener('click', function() {
    window.location.href = 'horsecamp://trip?d=' + raw;
  });
}

go();
</script>
</body>
</html>
